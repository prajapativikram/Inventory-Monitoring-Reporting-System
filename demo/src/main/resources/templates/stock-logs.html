<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Stock Logs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Stock Activity Logs</h2>

    <table class="table table-bordered shadow">
        <thead class="table-dark">
        <tr>
            <th style="text-align:center">Action</th>
            <th style="text-align:center">Item Name</th>
            <th style="text-align:center">Quantity</th>
            <th style="text-align:center">Time</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="log : ${logs}">
            <td th:text="${log.action}"></td>
            <td th:text="${log.itemName}"></td>
            <td th:text="${log.quantity}"></td>
            <td th:text="${#temporals.format(log.timestamp, 'dd-MM-yyyy HH:mm:ss')}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/products}" class="btn btn-secondary mt-3">
        Back
    </a>

</div>
<!--<div th:replace="footer :: footer"></div>-->
</body>
</html>
