<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Enterprise Inventory System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
        margin:0;
        font-family:Arial;
        }

        .hero{

        height:100vh;

        background-image:url("https://images.unsplash.com/photo-1553413077-190dd305871c");

        background-size:cover;

        background-position:center;

        display:flex;

        align-items:center;

        justify-content:center;

        text-align:center;

        color:white;

        position:relative;

        }

        .hero::before{

        content:"";

        position:absolute;

        top:0;

        left:0;

        width:100%;

        height:100%;

        background:rgba(0,0,0,0.6);

        }

        .hero-content{

        position:relative;

        z-index:2;

        max-width:700px;

        }

        .hero-content h1{

        font-size:48px;

        margin-bottom:20px;

        }

        .hero-content p{

        font-size:18px;

        margin-bottom:30px;

        }

        .btn-custom{

        padding:12px 28px;

        margin:8px;

        border-radius:6px;

        font-size:16px;

        }

        .btn-custom:hover{

        transform:translateY(-3px);

        transition:0.3s;

        }

    </style>

</head>

<body>

<div class="hero">

    <div class="hero-content">

        <h1>Enterprise Inventory Management System</h1>

        <p>
            Manage products, track inventory and analyze stock data
            with a powerful dashboard.
        </p>

        <a th:href="@{/login}" class="btn btn-primary btn-custom">
            Sign In
        </a>

        <a th:href="@{/register}" class="btn btn-light btn-custom">
            Sign Up
        </a>

    </div>

</div>

</body>
</html>
