<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Inventory Analytics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }
    </style>

</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">Inventory Analytics</h2>

    <a th:href="@{/}" class="btn btn-secondary mb-3">
        Back to Dashboard
    </a>

    <!-- Products Table -->

    <div class="card shadow-sm p-3">

        <h5 class="mb-3">Products</h5>

        <table class="table table-striped table-bordered align-middle text-center">

            <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Stock Update</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="item : ${items}"
                th:classappend="${item.quantity <= item.reorderLevel} ? 'table-danger'">

                <td th:text="${item.itemName}">Name</td>

                <td th:text="${item.category}">Category</td>

                <td th:text="${item.quantity}">0</td>

                <td>
                    ₹ <span th:text="${item.price}">0</span>
                </td>

                <td>

                    <a th:href="@{/increase/{id}(id=${item.id}, redirect='/analytics')}"
                       class="btn btn-sm btn-primary">+1</a>

                    <a th:href="@{/decrease/{id}(id=${item.id}, redirect='/analytics')}"
                       class="btn btn-sm btn-danger">-1</a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>


    <!-- ANALYTICS -->

    <div class="card mt-4">

        <div class="card-header">
            Stock Analytics
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6">

                    <h6 class="text-center">Stock Quantity</h6>

                    <div style="height:300px">
                        <canvas id="stockChart"></canvas>
                    </div>

                </div>

                <div class="col-md-6">

                    <h6 class="text-center">Stock Distribution</h6>

                    <div style="height:300px">
                        <canvas id="pieChart"></canvas>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>


<script th:inline="javascript">

    let items = [[${chartItems}]];

    let labels = [];
    let quantities = [];

    items.forEach(function(item){

    labels.push(item.itemName);
    quantities.push(item.quantity);

    });


    const barCtx = document.getElementById('stockChart');

    new Chart(barCtx, {

    type: 'bar',

    data: {
    labels: labels,
    datasets: [{
    label: 'Stock Quantity',
    data: quantities
    }]
    },

    options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false
    }

    });


    const pieCtx = document.getElementById('pieChart');

    new Chart(pieCtx, {

    type: 'pie',

    data: {
    labels: labels,
    datasets: [{
    data: quantities
    }]
    },

    options: {
    responsive: true,
    maintainAspectRatio: false
    }

    });

</script>

</body>
</html>
