<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Dashboard</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

    <h4>Inventory</h4>

    <a th:href="@{/}">Dashboard</a>
    <a th:href="@{/products}">Products</a>
    <a th:href="@{/stock-logs}">Stock Logs</a>
    <a th:href="@{/low-stock}">Low Stock</a>
    <a th:href="@{/export}">Export CSV</a>
    <a th:href="@{/logout}">Logout</a>

</div>

<div class="main">

    <h2>Dashboard</h2>

    <div class="row">

        <div class="col-md-4">

            <div class="card p-3">

                <h5>Total Inventory Value</h5>

                <h3 th:text="${totalValue}"></h3>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-3">

                <h5>Total Products</h5>

                <h3 th:text="${items.size()}"></h3>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-3">

                <h5>Low Stock Items</h5>

                <h3 th:text="${lowStockCount}"></h3>

            </div>

        </div>

    </div>

    <br>

    <div class="card p-4">

        <h5>Inventory Analytics</h5>

        <canvas id="inventoryChart"></canvas>

    </div>

</div>

<script>

    const ctx = document.getElementById('inventoryChart');

    new Chart(ctx,{

    type:'bar',

    data:{
    labels:['Products','Low Stock'],

    datasets:[{
    label:'Inventory',
    data:[
    [[${items.size()}]],
    [[${lowStockCount}]]
    ]
    }]
    }

    });

</script>

</body>
</html>
