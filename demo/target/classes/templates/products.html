<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Products</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>All Products</h2>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-dark">Logout</button>
        </form>
    </div>

    <!-- Navigation -->
    <div class="mb-3 d-flex gap-2">
        <a th:href="@{/}" class="btn btn-secondary">Dashboard</a>
        <a th:href="@{/products}" class="btn btn-primary">Products</a>
        <a th:href="@{/export}" sec:authorize="hasRole('ADMIN')" class="btn btn-success">Export CSV</a>
        <a th:href="@{/add}" class="btn btn-warning">Add Product</a>
    </div>

    <!-- Products Table -->
    <div class="card shadow-sm p-3">

        <table class="table table-striped table-bordered align-middle">
            <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.itemName}"></td>
                <td th:text="${item.category}"></td>
                <td th:text="${item.quantity}"></td>
                <td>₹ <span th:text="${item.price}"></span></td>
                <td>
                    <a th:href="@{'/delete/' + ${item.id}}"
                       sec:authorize="hasRole('ADMIN')"
                       class="btn btn-sm btn-danger">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

    </div>

</div>
<!--<div th:replace="footer :: footer"></div>-->
</body>
</html>
