<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Low Stock Items</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }
    </style>


</head>

<body class="bg-light">
<div class="page-content">

<div class="container mt-5">

    <h2 class="mb-4 text-danger">Low Stock Items (Less than 5)</h2>

    <table class="table table-bordered table-striped shadow">
        <thead class="table-dark">
        <tr>
            <th style="text-align:center">Name</th>
            <th style="text-align:center">Category</th>
            <th style="text-align:center">Quantity</th>
            <th style="text-align:center">Price</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${items}">
            <td style="text-align:center" th:text="${item.itemName}"></td>
            <td style="text-align:center" th:text="${item.category}"></td>
            <td style="text-align:center" class="text-danger fw-bold"
                th:text="${item.quantity}"></td>
            <td ₹ style="text-align:center" th:text="'₹ ' +${item.price}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/products}" class="btn btn-secondary mt-3">
        Back to Products
    </a>

</div>
</div>
<!--<div th:replace="footer :: footer"></div>-->
</body>
</html>
