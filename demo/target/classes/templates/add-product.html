<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        /* Force proper alignment */
        .card-body {
            text-align: left;
        }

        .form-label {
            text-align: left;
            display: block;
            width: 100%;
            font-weight: 500;
        }

        .form-control {
            text-align: left;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Add New Product</h2>

        <a th:href="@{/products}" class="btn btn-secondary">
            Back to Products
        </a>
    </div>

    <!-- Form Card -->
    <div class="card shadow-lg border-0">
        <div class="card-body p-4">

            <form th:action="@{/save}" th:object="${item}" method="post">

                <div class="row g-3">

                    <!-- Product Name -->
                    <div class="col-md-12">
                        <label class="form-label">Product Name</label>
                        <input type="text"
                               th:field="*{itemName}"
                               class="form-control"
                               placeholder="Enter product name"
                               required>
                    </div>

                    <!-- Category -->
                    <div class="col-md-6">
                        <label class="form-label">Category</label>
                        <input type="text"
                               th:field="*{category}"
                               class="form-control"
                               placeholder="Enter category"
                               required>
                    </div>

                    <!-- Quantity -->
                    <div class="col-md-6">
                        <label class="form-label">Quantity</label>
                        <input type="number"
                               th:field="*{quantity}"
                               class="form-control"
                               placeholder="0"
                               min="0"
                               required>
                    </div>

                    <!-- Price -->
                    <div class="col-md-6">
                        <label class="form-label">Price (₹)</label>
                        <input type="number"
                               step="0.01"
                               th:field="*{price}"
                               class="form-control"
                               placeholder="0.00"
                               min="0"
                               required>
                    </div>

                    <!-- Reorder Level -->
                    <div class="col-md-6">
                        <label class="form-label">Reorder Level</label>
                        <input type="number"
                               th:field="*{reorderLevel}"
                               class="form-control"
                               placeholder="Minimum stock level"
                               min="0"
                               required>
                    </div>

                </div>

                <hr class="my-4">

                <!-- Buttons -->
                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/products}" class="btn btn-outline-secondary">
                        Cancel
                    </a>

                    <button type="submit" class="btn btn-primary px-4">
                        Save Product
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

</body>
</html>
